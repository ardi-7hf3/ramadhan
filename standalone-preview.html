<style>
  /* ── base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #070E1C;
    overflow-x: hidden;
  }

  /* ── custom scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0D1830; }
  ::-webkit-scrollbar-thumb { background: #C9941A44; border-radius: 4px; }

  /* ── loader bar ── */
  @keyframes barFill { to { width: 100%; } }
  .bar-fill { animation: barFill 2.6s ease forwards; }

  /* ── starfield ── */
  @keyframes starFloat {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.7; }
    95%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(720deg); opacity: 0; }
  }
  .star-particle { animation: starFloat linear infinite; position: absolute; border-radius: 50%; }

  /* ── envelope flap animation ── */
  .env-flap {
    transform-style: preserve-3d;
    transform-origin: top center;
    transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flap-open { transform: rotateX(-185deg); }

  /* ── seal dissolve ── */
  .seal-wrap { transition: transform 0.5s ease, opacity 0.4s ease; }
  .seal-gone { transform: scale(0) rotate(30deg); opacity: 0; }

  /* ── card slide up ── */
  .card-peek {
    transition: bottom 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease 0.5s;
  }
  .card-visible { bottom: calc(100% + 20px) !important; opacity: 1 !important; }

  /* ── inside envelope revealed ── */
  .env-inside { transition: opacity 0.4s ease 0.5s; }
  .inside-show { opacity: 1 !important; }

  /* ── paper texture lines ── */
  .paper-lines {
    background-image: repeating-linear-gradient(
      transparent 0px, transparent 29px,
      rgba(160,120,40,0.07) 30px
    );
  }

  /* ── gold shimmer text ── */
  @keyframes goldShimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .gold-shimmer-text {
    background: linear-gradient(
      90deg,
      #8B6310 0%, #C9941A 20%, #F5D87A 40%,
      #E8B84B 60%, #C9941A 80%, #8B6310 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: goldShimmer 4s linear infinite;
  }

  /* ── geometric ornament line ── */
  .ornament-line {
    display: flex; align-items: center; gap: 10px;
    margin: 10px 0;
  }
  .ornament-line::before,
  .ornament-line::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,148,26,0.4), transparent);
  }

  /* ── card reveal stagger ── */
  .reveal > * { opacity: 0; animation: fadeUp 0.6s ease both; }
  .reveal > *:nth-child(1)  { animation-delay: 0.05s; }
  .reveal > *:nth-child(2)  { animation-delay: 0.15s; }
  .reveal > *:nth-child(3)  { animation-delay: 0.25s; }
  .reveal > *:nth-child(4)  { animation-delay: 0.35s; }
  .reveal > *:nth-child(5)  { animation-delay: 0.45s; }
  .reveal > *:nth-child(6)  { animation-delay: 0.55s; }
  .reveal > *:nth-child(7)  { animation-delay: 0.65s; }
  .reveal > *:nth-child(8)  { animation-delay: 0.75s; }
  .reveal > *:nth-child(9)  { animation-delay: 0.85s; }
  .reveal > *:nth-child(10) { animation-delay: 0.95s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── lantern swing ── */
  @keyframes lanternSwing {
    0%,100% { transform: rotate(-10deg); }
    50%      { transform: rotate(10deg) translateY(-4px); }
  }
  .lantern-1 { animation: lanternSwing 2.4s ease-in-out infinite; }
  .lantern-2 { animation: lanternSwing 2.0s ease-in-out infinite 0.3s reverse; }
  .lantern-3 { animation: lanternSwing 2.6s ease-in-out infinite 0.6s; }

  /* ── wish card hover ── */
  .wish-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .wish-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(201,148,26,0.15);
    border-color: rgba(201,148,26,0.4);
  }

  /* ── button effects ── */
  .btn-gold {
    background: linear-gradient(135deg, #C9941A 0%, #E8B84B 50%, #C9941A 100%);
    background-size: 200% auto;
    transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-gold:hover {
    background-position: right center;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,148,26,0.5);
  }
  .btn-teal {
    transition: all 0.2s ease;
  }
  .btn-teal:hover {
    background: rgba(15,122,107,0.12);
    border-color: rgba(62,203,184,0.5);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(15,122,107,0.2);
  }

  /* ── hint bounce ── */
  @keyframes hintBounce {
    0%,100% { transform: translateY(0); opacity: 0.7; }
    50%      { transform: translateY(-6px); opacity: 1; }
  }
  .hint-anim { animation: hintBounce 2s ease-in-out infinite; }

  /* ── cta pulse ── */
  @keyframes ctaPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,148,26,0.35); }
    50%      { box-shadow: 0 0 0 12px rgba(201,148,26,0); }
  }
  .cta-pulse { animation: ctaPulse 2.2s ease-in-out infinite; }

  /* ── moon glow ── */
  @keyframes moonGlow {
    0%,100% { filter: drop-shadow(0 0 10px rgba(201,148,26,0.5)); }
    50%      { filter: drop-shadow(0 0 28px rgba(245,216,122,0.85)); }
  }
  .moon-glow { animation: moonGlow 3s ease-in-out infinite; }

  /* ── toast ── */
  .toast-slide { transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease; }
</style>
</head>

/* ════════════════════════════════════
   STARFIELD
════════════════════════════════════ */
const Starfield = () => {
  const stars = useRef([]);
  useEffect(() => {
    const count = 150;
    stars.current = Array.from({ length: count }, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      size: Math.random() * 2.5 + 0.5,
      duration: Math.random() * 25 + 15,
      delay: Math.random() * 20,
      gold: Math.random() > 0.72,
    }));
  }, []);
  return (
    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none">
      {stars.current.map(s => (
        <div key={s.id} className="star-particle" style={{
          left: `${s.left}%`, bottom: '-10px',
          width: s.size, height: s.size,
          background: s.gold ? '#E8B84B' : '#FFFFFF',
          animationDuration: `${s.duration}s`,
          animationDelay: `${s.delay}s`,
          opacity: 0,
        }}/>
      ))}
    </div>
  );
};

const App = () => {
  const [loaderDone, setLoaderDone]   = useState(false);
  const [lang, setLang]               = useState('id');
  const [opened, setOpened]           = useState(false);
  const [showToast, setShowToast]     = useState(false);
  const t = LANG[lang];

  // Hide loader
  useEffect(() => {
    const timer = setTimeout(() => setLoaderDone(true), 2900);
    return () => clearTimeout(timer);
  }, []);

  // Envelope open sequence
  const handleOpen = useCallback(() => {
    if (opened) return;
    setOpened(true);

    // Step 1 — flap rotates open
    requestAnimationFrame(() => {
      const flap = document.getElementById('env-flap');
      const seal = document.getElementById('wax-seal');
      const label = document.getElementById('env-label');
      const inside = document.getElementById('env-inside');
      if (flap)  flap.classList.add('flap-open');
      if (seal)  { setTimeout(() => seal.classList.add('seal-gone'), 80); }
      if (label) { setTimeout(() => { label.style.opacity = '0'; label.style.transition = 'opacity 0.3s ease'; }, 200); }
      if (inside){ setTimeout(() => inside.classList.add('inside-show'), 500); }
    });

    // Step 2 — card slides up
    setTimeout(() => {
      const card = document.getElementById('card-peek');
      if (card) card.classList.add('card-visible');
    }, 700);
  }, [opened]);

  const toggleLang = () => setLang(l => l === 'id' ? 'en' : 'id');

  const handleShare = () => {
    const url = window.location.href;
    const msg = lang === 'id'
      ? 'Minal Aaidiin Wal Faaiziin — Mohon Maaf Lahir dan Batin'
      : 'Happy Eid Mubarak — from MPK & OSIS';
    if (navigator.share) {
      navigator.share({ title:'Eid Mubarak', text:msg, url }).catch(()=>{});
    } else {
      navigator.clipboard.writeText(url).then(() => {
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);

  return (

        style={{
          background:'rgba(201,148,26,0.1)', border:'1.5px solid rgba(201,148,26,0.3)',

        {t.langLabel}
      </button>

      <div className="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-16">

        {/* Hint text */}
        {!opened && (
          <div className="hint-anim mb-8">
